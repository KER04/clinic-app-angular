<div class="container mx-auto p-4 max-w-4xl">
  <div *ngIf="loadingData" class="flex justify-center items-center h-64">
    <p-progressSpinner styleClass="w-16 h-16" strokeWidth="4"></p-progressSpinner>
  </div>

  <p-card *ngIf="!loadingData">
    <ng-template pTemplate="header">
      <div class="p-4 border-b">
        <div class="flex items-center gap-3">
          <button pButton icon="pi pi-arrow-left" class="p-button-text p-button-rounded" (click)="onCancel()" [disabled]="loading"></button>
          <div>
            <h2 class="text-2xl font-bold text-gray-800">Actualizar Diagnóstico</h2>
            <p class="text-gray-600 mt-1">Modifique la información del diagnóstico</p>
          </div>
        </div>
      </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">ID Paciente <span class="text-red-500">*</span></label>
          <input pInputText formControlName="patient_id" type="number" class="w-full"
            [ngClass]="{'ng-invalid ng-dirty': isInvalid('patient_id')}" />
          <small class="text-red-500" *ngIf="isInvalid('patient_id')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">ID Cita <span class="text-red-500">*</span></label>
          <input pInputText formControlName="appointment_id" type="number" class="w-full"
            [ngClass]="{'ng-invalid ng-dirty': isInvalid('appointment_id')}" />
          <small class="text-red-500" *ngIf="isInvalid('appointment_id')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Código CIE-10</label>
          <input pInputText formControlName="icd10_code" class="w-full" />
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Fecha de Diagnóstico <span class="text-red-500">*</span></label>
          <p-datepicker formControlName="diagnosis_date" [showIcon]="true" dateFormat="dd/mm/yy" class="w-full"
            [ngClass]="{'ng-invalid ng-dirty': isInvalid('diagnosis_date')}"></p-datepicker>
          <small class="text-red-500" *ngIf="isInvalid('diagnosis_date')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2 md:col-span-2">
          <label class="font-semibold text-gray-700">Descripción <span class="text-red-500">*</span></label>
          <textarea formControlName="description" rows="3" class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            [class.border-red-500]="isInvalid('description')"></textarea>
          <small class="text-red-500" *ngIf="isInvalid('description')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2 md:col-span-2">
          <label class="font-semibold text-gray-700">Observaciones</label>
          <textarea formControlName="observations" rows="2" class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Estado <span class="text-red-500">*</span></label>
          <p-select formControlName="status" [options]="statusOptions" optionLabel="label" optionValue="value" class="w-full"></p-select>
        </div>

      </div>

      <div class="flex gap-3 justify-end mt-6 pt-4 border-t">
        <p-button label="Cancelar" severity="secondary" [outlined]="true" icon="pi pi-times" (onClick)="onCancel()" [disabled]="loading"></p-button>
        <p-button label="Actualizar Diagnóstico" type="submit" icon="pi pi-save" [loading]="loading" [disabled]="loading || form.invalid || !form.dirty"></p-button>
      </div>
    </form>
  </p-card>
</div>
<p-toast position="top-right"></p-toast>
