<div class="card p-8">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Gestión de Especialidades</h2>
        <button 
            pButton 
            label="Nueva Especialidad" 
            icon="pi pi-plus" 
            class="p-button-success"
            routerLink="/Specialty/Create"
        ></button>
    </div>

    <p-table 
        [value]="specialties" 
        [loading]="loading"
        stripedRows 
        [tableStyle]="{'min-width': '50rem'}"
        [paginator]="true"
        [rows]="10"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
    >
        <ng-template pTemplate="header">
            <tr>
                <th class="text-left">ID</th>
                <th class="text-left">Nombre de Especialidad</th>
                <th class="text-left">Descripción</th>
                <th class="text-left">Estado</th>
                <th class="text-center">Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-specialty>
            <tr>
                <td>{{specialty.id}}</td>
                <td class="font-semibold">{{specialty.specialty_name}}</td>
                <td>
                    <span *ngIf="specialty.description; else noDescription">
                        {{specialty.description}}
                    </span>
                    <ng-template #noDescription>
                        <span class="text-gray-400 italic">Sin descripción</span>
                    </ng-template>
                </td>
                <td>
                    <span 
                        class="px-3 py-1 rounded-full text-xs font-semibold"
                        [ngClass]="specialty.status === 'ACTIVE' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                    >
                        {{specialty.status === 'ACTIVE' ? 'Activo' : 'Inactivo'}}
                    </span>
                </td>
                <td class="text-center">
                    <!-- Botón Editar -->
                    <button 
                        pButton 
                        icon="pi pi-pencil" 
                        class="p-button-rounded p-button-warning p-button-text mr-2"
                        [routerLink]="['/Specialty/Update', specialty.id]"
                        pTooltip="Editar"
                        tooltipPosition="top"
                    ></button>
                    <!-- Botón Eliminar/Activar -->
                    <button 
                        pButton 
                        [icon]="specialty.status === 'ACTIVE' ? 'pi pi-trash' : 'pi pi-check-circle'"
                        [class]="specialty.status === 'ACTIVE' ? 'p-button-rounded p-button-danger p-button-text' : 'p-button-rounded p-button-success p-button-text'"
                        [pTooltip]="specialty.status === 'ACTIVE' ? 'Desactivar' : 'Activar'"
                        tooltipPosition="top"
                        (click)="toggleStatus(specialty)"
                    ></button>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="5" class="text-center py-8">
                    <i class="pi pi-inbox text-4xl text-gray-400 mb-3"></i>
                    <p class="text-gray-500 font-semibold">No hay especialidades registradas</p>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-confirmdialog></p-confirmdialog>
<p-toast></p-toast>
