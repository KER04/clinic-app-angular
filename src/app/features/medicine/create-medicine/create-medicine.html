<div class="container mx-auto p-4 max-w-4xl">
  <p-card>
    <ng-template pTemplate="header">
      <div class="p-4">
        <h2 class="text-2xl font-bold text-gray-800">Nuevo Medicamento</h2>
        <p class="text-gray-600 mt-1">Complete los datos del medicamento</p>
      </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Nombre Comercial <span class="text-red-500">*</span></label>
          <input pInputText formControlName="commercial_name" placeholder="Ej: Ibuprofeno 400"
            [class.ng-invalid]="isInvalid('commercial_name')" />
          <small class="text-red-500" *ngIf="isInvalid('commercial_name')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Nombre Genérico <span class="text-red-500">*</span></label>
          <input pInputText formControlName="generic_name" placeholder="Ej: Ibuprofeno"
            [class.ng-invalid]="isInvalid('generic_name')" />
          <small class="text-red-500" *ngIf="isInvalid('generic_name')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Concentración <span class="text-red-500">*</span></label>
          <input pInputText formControlName="concentration" placeholder="Ej: 400mg"
            [class.ng-invalid]="isInvalid('concentration')" />
          <small class="text-red-500" *ngIf="isInvalid('concentration')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Forma Farmacéutica <span class="text-red-500">*</span></label>
          <input pInputText formControlName="pharmaceutical_form" placeholder="Ej: Tableta, Jarabe"
            [class.ng-invalid]="isInvalid('pharmaceutical_form')" />
          <small class="text-red-500" *ngIf="isInvalid('pharmaceutical_form')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Laboratorio <span class="text-red-500">*</span></label>
          <input pInputText formControlName="laboratory" placeholder="Ej: Genfar"
            [class.ng-invalid]="isInvalid('laboratory')" />
          <small class="text-red-500" *ngIf="isInvalid('laboratory')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Precio Unitario <span class="text-red-500">*</span></label>
          <input pInputText formControlName="unit_price" placeholder="Ej: 12500.00"
            [class.ng-invalid]="isInvalid('unit_price')" />
          <small class="text-red-500" *ngIf="isInvalid('unit_price')">Campo requerido</small>
        </div>

      </div>

      <div class="flex gap-3 justify-end mt-6">
        <p-button label="Cancelar" severity="secondary" [outlined]="true" (onClick)="onCancel()"></p-button>
        <p-button label="Guardar Medicamento" type="submit" icon="pi pi-check" [loading]="loading" [disabled]="loading"></p-button>
      </div>
    </form>
  </p-card>
</div>
<p-toast></p-toast>
