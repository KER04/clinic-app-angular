<div class="container mx-auto p-4 max-w-4xl">
  <p-card>
    <ng-template pTemplate="header">
      <div class="p-4">
        <h2 class="text-2xl font-bold text-gray-800">Nueva Prescripción</h2>
        <p class="text-gray-600 mt-1">Complete los datos de la prescripción</p>
      </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div class="flex flex-col gap-2">
          <label class="font-semibold">ID Cita <span class="text-red-500">*</span></label>
          <input pInputText formControlName="appointment_id" type="number" placeholder="ID de la cita"
            [class.ng-invalid]="isInvalid('appointment_id')" />
          <small class="text-red-500" *ngIf="isInvalid('appointment_id')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">ID Doctor <span class="text-red-500">*</span></label>
          <input pInputText formControlName="doctor_id" type="number" placeholder="ID del doctor"
            [class.ng-invalid]="isInvalid('doctor_id')" />
          <small class="text-red-500" *ngIf="isInvalid('doctor_id')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Fecha de Emisión <span class="text-red-500">*</span></label>
          <p-datepicker formControlName="issue_date" [showIcon]="true" dateFormat="dd/mm/yy"
            placeholder="Seleccione la fecha" [class.ng-invalid]="isInvalid('issue_date')"></p-datepicker>
          <small class="text-red-500" *ngIf="isInvalid('issue_date')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2 md:col-span-2">
          <label class="font-semibold">Instrucciones Generales</label>
          <textarea formControlName="general_instructions" rows="3" placeholder="Instrucciones para el paciente"
            class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

      </div>

      <div class="flex gap-3 justify-end mt-6">
        <p-button label="Cancelar" severity="secondary" [outlined]="true" (onClick)="onCancel()"></p-button>
        <p-button label="Guardar Prescripción" type="submit" icon="pi pi-check" [loading]="loading" [disabled]="loading"></p-button>
      </div>
    </form>
  </p-card>
</div>
<p-toast></p-toast>
