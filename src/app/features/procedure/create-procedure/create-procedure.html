<div class="container mx-auto p-4 max-w-4xl">
  <p-card>
    <ng-template pTemplate="header">
      <div class="p-4">
        <h2 class="text-2xl font-bold text-gray-800">Nuevo Procedimiento</h2>
        <p class="text-gray-600 mt-1">Complete los datos del procedimiento</p>
      </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div class="flex flex-col gap-2">
          <label class="font-semibold">ID Cita <span class="text-red-500">*</span></label>
          <input pInputText formControlName="appointment_id" type="number" placeholder="ID de la cita"
            [class.ng-invalid]="isInvalid('appointment_id')" />
          <small class="text-red-500" *ngIf="isInvalid('appointment_id')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Código <span class="text-red-500">*</span></label>
          <input pInputText formControlName="procedure_code" placeholder="Ej: PROC-001"
            [class.ng-invalid]="isInvalid('procedure_code')" />
          <small class="text-red-500" *ngIf="isInvalid('procedure_code')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Nombre del Procedimiento <span class="text-red-500">*</span></label>
          <input pInputText formControlName="procedure_name" placeholder="Nombre del procedimiento"
            [class.ng-invalid]="isInvalid('procedure_name')" />
          <small class="text-red-500" *ngIf="isInvalid('procedure_name')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Costo <span class="text-red-500">*</span></label>
          <input pInputText formControlName="cost" placeholder="Ej: 200000.00"
            [class.ng-invalid]="isInvalid('cost')" />
          <small class="text-red-500" *ngIf="isInvalid('cost')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Fecha de Realización <span class="text-red-500">*</span></label>
          <p-datepicker formControlName="performed_date" [showIcon]="true" dateFormat="dd/mm/yy"
            placeholder="Seleccione la fecha" [class.ng-invalid]="isInvalid('performed_date')"></p-datepicker>
          <small class="text-red-500" *ngIf="isInvalid('performed_date')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2 md:col-span-2">
          <label class="font-semibold">Descripción</label>
          <textarea formControlName="description" rows="2" placeholder="Descripción del procedimiento"
            class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

      </div>

      <div class="flex gap-3 justify-end mt-6">
        <p-button label="Cancelar" severity="secondary" [outlined]="true" (onClick)="onCancel()"></p-button>
        <p-button label="Guardar Procedimiento" type="submit" icon="pi pi-check" [loading]="loading" [disabled]="loading"></p-button>
      </div>
    </form>
  </p-card>
</div>
<p-toast></p-toast>
