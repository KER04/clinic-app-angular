<div class="container mx-auto p-4 max-w-4xl">
  <p-card>
    <ng-template pTemplate="header">
      <div class="p-4">
        <h2 class="text-2xl font-bold text-gray-800">Nuevo Pago</h2>
        <p class="text-gray-600 mt-1">Complete los datos del pago</p>
      </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div class="flex flex-col gap-2">
          <label class="font-semibold">ID Cita <span class="text-red-500">*</span></label>
          <input pInputText formControlName="appointment_id" type="number" placeholder="ID de la cita"
            [class.ng-invalid]="isInvalid('appointment_id')" />
          <small class="text-red-500" *ngIf="isInvalid('appointment_id')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">N° Factura</label>
          <input pInputText formControlName="invoice_number" placeholder="Número de factura" />
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Monto Total <span class="text-red-500">*</span></label>
          <input pInputText formControlName="total_amount" placeholder="Ej: 150000.00"
            [class.ng-invalid]="isInvalid('total_amount')" />
          <small class="text-red-500" *ngIf="isInvalid('total_amount')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Monto Consulta <span class="text-red-500">*</span></label>
          <input pInputText formControlName="consultation_amount" placeholder="Ej: 50000.00"
            [class.ng-invalid]="isInvalid('consultation_amount')" />
          <small class="text-red-500" *ngIf="isInvalid('consultation_amount')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Monto Procedimientos <span class="text-red-500">*</span></label>
          <input pInputText formControlName="procedures_amount" placeholder="Ej: 100000.00"
            [class.ng-invalid]="isInvalid('procedures_amount')" />
          <small class="text-red-500" *ngIf="isInvalid('procedures_amount')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Fecha de Pago <span class="text-red-500">*</span></label>
          <p-datepicker formControlName="payment_date" [showIcon]="true" dateFormat="dd/mm/yy"
            placeholder="Seleccione la fecha" [class.ng-invalid]="isInvalid('payment_date')"></p-datepicker>
          <small class="text-red-500" *ngIf="isInvalid('payment_date')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Método de Pago <span class="text-red-500">*</span></label>
          <p-select formControlName="payment_method" [options]="paymentMethodOptions" optionLabel="label" optionValue="value"
            placeholder="Seleccione el método" [class.ng-invalid]="isInvalid('payment_method')"></p-select>
          <small class="text-red-500" *ngIf="isInvalid('payment_method')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold">Estado del Pago <span class="text-red-500">*</span></label>
          <p-select formControlName="payment_status" [options]="paymentStatusOptions" optionLabel="label" optionValue="value"
            placeholder="Seleccione el estado" [class.ng-invalid]="isInvalid('payment_status')"></p-select>
          <small class="text-red-500" *ngIf="isInvalid('payment_status')">Campo requerido</small>
        </div>

      </div>

      <div class="flex gap-3 justify-end mt-6">
        <p-button label="Cancelar" severity="secondary" [outlined]="true" (onClick)="onCancel()"></p-button>
        <p-button label="Guardar Pago" type="submit" icon="pi pi-check" [loading]="loading" [disabled]="loading"></p-button>
      </div>
    </form>
  </p-card>
</div>
<p-toast></p-toast>
