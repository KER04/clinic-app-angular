<div class="container mx-auto p-4 max-w-4xl">
  <div *ngIf="loadingData" class="flex justify-center items-center h-64">
    <p-progressSpinner styleClass="w-16 h-16" strokeWidth="4"></p-progressSpinner>
  </div>

  <p-card *ngIf="!loadingData">
    <ng-template pTemplate="header">
      <div class="p-4 border-b">
        <div class="flex items-center gap-3">
          <button pButton icon="pi pi-arrow-left" class="p-button-text p-button-rounded" (click)="onCancel()" [disabled]="loading"></button>
          <div>
            <h2 class="text-2xl font-bold text-gray-800">Actualizar Pago</h2>
            <p class="text-gray-600 mt-1">Modifique la información del pago</p>
          </div>
        </div>
      </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">ID Cita <span class="text-red-500">*</span></label>
          <input pInputText formControlName="appointment_id" type="number" class="w-full"
            [ngClass]="{'ng-invalid ng-dirty': isInvalid('appointment_id')}" />
          <small class="text-red-500" *ngIf="isInvalid('appointment_id')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">N° Factura</label>
          <input pInputText formControlName="invoice_number" class="w-full" />
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Monto Total <span class="text-red-500">*</span></label>
          <input pInputText formControlName="total_amount" class="w-full"
            [ngClass]="{'ng-invalid ng-dirty': isInvalid('total_amount')}" />
          <small class="text-red-500" *ngIf="isInvalid('total_amount')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Monto Consulta <span class="text-red-500">*</span></label>
          <input pInputText formControlName="consultation_amount" class="w-full"
            [ngClass]="{'ng-invalid ng-dirty': isInvalid('consultation_amount')}" />
          <small class="text-red-500" *ngIf="isInvalid('consultation_amount')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Monto Procedimientos <span class="text-red-500">*</span></label>
          <input pInputText formControlName="procedures_amount" class="w-full"
            [ngClass]="{'ng-invalid ng-dirty': isInvalid('procedures_amount')}" />
          <small class="text-red-500" *ngIf="isInvalid('procedures_amount')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Fecha de Pago <span class="text-red-500">*</span></label>
          <p-datepicker formControlName="payment_date" [showIcon]="true" dateFormat="dd/mm/yy" class="w-full"
            [ngClass]="{'ng-invalid ng-dirty': isInvalid('payment_date')}"></p-datepicker>
          <small class="text-red-500" *ngIf="isInvalid('payment_date')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Método de Pago <span class="text-red-500">*</span></label>
          <p-select formControlName="payment_method" [options]="paymentMethodOptions" optionLabel="label" optionValue="value" class="w-full"
            [ngClass]="{'ng-invalid ng-dirty': isInvalid('payment_method')}"></p-select>
          <small class="text-red-500" *ngIf="isInvalid('payment_method')">Campo requerido</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Estado del Pago <span class="text-red-500">*</span></label>
          <p-select formControlName="payment_status" [options]="paymentStatusOptions" optionLabel="label" optionValue="value" class="w-full"></p-select>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-semibold text-gray-700">Estado <span class="text-red-500">*</span></label>
          <p-select formControlName="status" [options]="statusOptions" optionLabel="label" optionValue="value" class="w-full"></p-select>
        </div>

      </div>

      <div class="flex gap-3 justify-end mt-6 pt-4 border-t">
        <p-button label="Cancelar" severity="secondary" [outlined]="true" icon="pi pi-times" (onClick)="onCancel()" [disabled]="loading"></p-button>
        <p-button label="Actualizar Pago" type="submit" icon="pi pi-save" [loading]="loading" [disabled]="loading || form.invalid || !form.dirty"></p-button>
      </div>
    </form>
  </p-card>
</div>
<p-toast position="top-right"></p-toast>
